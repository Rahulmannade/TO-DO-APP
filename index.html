<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager Pro</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Task Manager Pro</h1>
        <p class="subtitle">Stay organized, get things done</p>
      </header>

      <div class="stats">
        <div class="stat">
          <span class="stat-value" id="totalTasks">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="activeTasks">0</span>
          <span class="stat-label">Active</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="completedTasks">0</span>
          <span class="stat-label">Done</span>
        </div>
      </div>

      <div class="input-section">
        <input
          type="text"
          class="task-input"
          id="taskInput"
          placeholder="What needs to be done?"
          autocomplete="off"
        />
        <button class="add-btn" id="addBtn">
          <span>+</span>
          <span>Add Task</span>
        </button>
      </div>

      <div class="filter-tabs">
        <button class="filter-btn active" data-filter="all">All Tasks</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>

      <ul class="task-list" id="taskList">
        <!-- Tasks will be rendered here -->
      </ul>

      <button class="clear-completed" id="clearCompleted">
        Clear Completed Tasks
      </button>

      <div class="empty-state" id="emptyState" style="display: none">
        <div class="empty-icon">📋</div>
        <div class="empty-text">No tasks yet</div>
        <div class="empty-subtext">Add a task above to get started</div>
      </div>
    </div>

    <div class="toast" id="toast">
      <span id="toastIcon">✓</span>
      <span id="toastMessage">Operation successful</span>
    </div>
    <script src="script.js"></script>
  </body>
</html>
